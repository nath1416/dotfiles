$scriptPath = /home/nathan/.config/hypr/script

$font = CousineNerdFont

general {
    hide_cursor = true
    ignore_empty_input = true
}

 auth {
     fingerprint {
         enabled = true
         ready_message = Scan fingerprint to unlock
         present_message = Scanning...
         retry_delay = 250 
     }
 }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    color = rgba(150, 205, 248, 1)
    monitor =
    path = /home/nathan/wallpapers/people_walking_on_a_platform.jpg
    reload_time = 0
    blur_passes = 3 
    blur_size = 5
    brightness = 0.6
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" 
    font_size = 25
    font_family = $font
    color = rgba(202, 230, 255, 1)

    position = 0, 500
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME 
    font_size = 80
    font_family = $font
    color = rgba(202, 230, 255, 1)
    position = 0, 390
    halign = center
    valign = center
}

input-field {
    monitor = eDP-1
    size = 20%, 5%
    outline_thickness = 2

    inner_color = rgba(0, 75, 112, 0.30)
    outer_color = rgba(202, 230, 255, 0.9)
    font_color = rgba(202, 230, 255, 0.75)

    capslock_color = rgba(211, 229, 245, 0.75)
    #fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg
#    capslock_color = rgba(ff0000ff)

#    color = rgb(%%foreground%%)
#    font_size = 25
    fade_on_empty = false
    rounding = 10

#    font_family = $font
    placeholder_text = 
    fail_text = $PAMFAIL

    dots_size = 0.4
    dots_spacing = 0.3

   #hide_input = true

    position = 0, -50
    halign = center
    valign = center
}
image {
    monitor = eDP-1
    path = 
    size = 120
    rounding = 5 # negative values mean circle
    border_size = 2
    border_color = rgba(202, 230, 255, 0.75)
    rotate = 0 # degrees, counter-clockwise
    reload_time = 1
    reload_cmd = $scriptPath/mediaPlayer.sh image
    position = 0,-440
    halign = center
    valign = center
    opacity = 0.5
}

label {
    monitor = eDP-1
    text = cmd[update:2000] $scriptPath/mediaPlayer.sh dataImageProof
    font_size = 15
    font_family = $font
    color = rgba(202, 230, 255, 1)

    position = 0, -550
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = cmd[update:1000] $scriptPath/getBatteryPourcentage.sh
    font_size = 15
    font_family = $font
    color = rgba(202, 230, 255, 1)
    position = 875, -550
    halign = center
    valign = center
}
