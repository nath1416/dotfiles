$scriptPath = /home/nathan/.config/hypr/script

$font = CousineNerdFont

general {
    hide_cursor = true
    ignore_empty_input = true
}

 auth {
     fingerprint {
         enabled = true
         ready_message = Scan fingerprint to unlock
         present_message = Scanning...
         retry_delay = 250 
     }
 }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    color = rgba(182, 196, 255, 1)
    monitor =
    path = /home/nathan/wallpapers/a_tall_building_with_many_windows_with_Flatiron_Building_in_the_background.jpg
    reload_time = 0
    blur_passes = 3 
    blur_size = 5
    brightness = 0.6
}

# Time and Date Laptop
label {
    monitor = desc:AU Optronics 0xD291
    text = cmd[update:60000] date +"%A, %d %B %Y" 
    font_size = 25
    font_family = $font
    color = rgba(220, 225, 255, 1)

    position = 0, 500
    halign = center
    valign = center
}
label {
    monitor = desc:AU Optronics 0xD291
