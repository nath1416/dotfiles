$TIMEOUT = 120 

general {
    lock_cmd = pidof hyprlock || hyprlock 
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = brightnessctl -r -d intel_backlight 
    inhibit_sleep = 1
}

listener {
    timeout = 15
    on-timeout = brightnessctl -s -d tpacpi::kbd_backlight && brightnessctl -d tpacpi::kbd_backlight s 0%
    on-resume = brightnessctl -r -d tpacpi::kbd_backlight 
}
listener {
    timeout = $TIMEOUT
    on-timeout = brightnessctl -s -d intel_backlight && brightnessctl -d intel_backlight -e4 -n2 set 25%-
    on-resume = brightnessctl -r -d intel_backlight && /home/nathan/.config/hypr/script/volumeControl.sh updateLigths
}

listener {
    timeout = {{TIMEOUT + 40}}
    on-timeout = dunstify "Will lock in 30 second"
}

listener {
    timeout = {{TIMEOUT + 60}}
    on-timeout = dunstify "Will lock in 10 second"
}

listener {
    timeout = {{TIMEOUT + 70}}
    on-timeout = loginctl lock-session            # lock screen when timeout has passed
}

listener {
    timeout = {{TIMEOUT + 120}}
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({action = "off" })'
    on-resume =  hyprctl dispatch 'hl.dsp.dpms({action = "on" })' && brightnessctl -r
}
