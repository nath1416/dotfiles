###################
### Configs ###
###################

$SCRIPT_PATH= $HOME/.config/hypr/script
$launcher = /usr/bin/app2unit

$config_prefix = ~/.config/hypr/conf

source = $config_prefix/inputs.conf
source = $config_prefix/monitors.conf
source = $config_prefix/programs.conf
source = $config_prefix/windowRules.conf
source = $config_prefix/workspaceRules.conf
source = $config_prefix/binds.conf
source = $config_prefix/gestures.conf
source = $config_prefix/layouts.conf

#################
### AUTOSTART ###
#################

exec-once = kbuildsycoca6

exec-once = $launcher $terminal
exec-once = $launcher awww-daemon
#exec-once = sleep 2 && $SCRIPT_PATH/wallpaperSwitcher.sh set-random

# Screen Sharing
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


#####################
### LOOK AND FEEL ###
#####################

# Colors
source = ~/.cache/hellwal/hyprland-colors.conf

general {
    border_size = 2 

    gaps_in = 1
    gaps_out = 5

    col.active_border = $color12
    col.inactive_border = rgba(595959aa)

    resize_on_border = true
    allow_tearing = false

    layout = scrolling

    snap {
        enabled = true
        window_gap = 15
        monitor_gap = 15
        border_overlap = false
        respect_gaps = false
    }
}

decoration {
    rounding = 5
    rounding_power = 2.0

    active_opacity = 1.0
    inactive_opacity = 0.95

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        noise = 0.0117
        contrast = 0.8916
        brightness = 0.8172
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 1, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, quick
    animation = fadeOut, 1, 1.46, quick
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, slide fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true 
    disable_splash_rendering = true
    focus_on_activate = true
    middle_click_paste = false
}


ecosystem {
    no_donation_nag = true
}

debug {
    overlay = false
}

xwayland {
    enabled = true
    force_zero_scaling = true
}
###################
### PERMISSIONS ###
###################

ecosystem {
   enforce_permissions = 1
}

permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(bin|local/bin)/hyprlock, screencopy, allow
